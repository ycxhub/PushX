              "surface-variant": "#262626",

            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .metric-glow {
            text-shadow: 0 0 32px rgba(129, 236, 255, 0.4);
        }
        .skeletal-grid {
            background-image: linear-gradient(rgba(72, 72, 71, 0.1) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(72, 72, 71, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body select-none overflow-hidden">
<!-- TopAppBar Fragment: Suppressed Shell for Focused Session -->
<header class="bg-[#0e0e0e] flex justify-between items-center w-full px-5 py-4 top-0 z-50">
<div class="flex items-center gap-3">
<span class="text-2xl font-black text-[#81ecff] tracking-widest font-sans uppercase">PUSHX</span>
</div>
<div class="flex items-center gap-2">
<div class="bg-surface-container-highest px-3 py-1 rounded-lg">
<span class="text-[10px] font-bold tracking-[0.05rem] uppercase text-on-surface-variant">ELAPSED</span>
<span class="text-primary font-mono block leading-none">01:24</span>
</div>
</div>
</header>
<main class="relative h-[calc(100vh-140px)] w-full flex flex-col">
<!-- Live Performance Canvas -->
<div class="absolute inset-0 skeletal-grid opacity-30 pointer-events-none"></div>
<!-- Asymmetric Metrics Cluster -->
<div class="relative z-10 px-5 pt-8 flex flex-col items-start">
<div class="flex flex-col">
<span class="text-[0.6875rem] font-bold tracking-[0.15rem] uppercase text-primary mb-1">CURRENT SET: DIAMOND</span>
<h1 class="text-[8rem] font-black leading-[0.8] tracking-tighter text-on-background metric-glow">24</h1>
<div class="mt-2 flex items-center gap-4">
<div class="flex flex-col">
<span class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">TARGET</span>
<span class="text-lg font-bold">35</span>
</div>
<div class="w-px h-8 bg-outline-variant/30"></div>
<div class="flex flex-col">
<span class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">INTENSITY</span>
<span class="text-lg font-bold">88%</span>
</div>
</div>
</div>
</div>
<!-- Holographic Skeletal Overlay Container -->
<div class="flex-grow flex items-center justify-center relative px-5">
<div class="w-full aspect-square max-w-md relative">
<!-- Visual representation of biomechanical tracking -->
<div class="absolute inset-0 border border-primary/20 rounded-full animate-pulse flex items-center justify-center">
<div class="w-3/4 h-3/4 border border-primary/10 rounded-full"></div>
</div>
<img alt="Pushup form skeletal tracking" class="w-full h-full object-contain mix-blend-screen opacity-60 grayscale filter contrast-125" data-alt="Technical skeletal overlay on person performing pushup" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAIJviDrDRTFrzKr-4L3vI49hT8Vw0lYg_AhkgP2uerkVDNQJ_lxK-l-gaC1CB7zeMrG62RTrJZ_kmLUWQ53pXn5yw-F1dp1ZzhbezTzl5CZCjrfR-1lsEbNip2Qv7BV9sfsv4TVGg9OYT4Mc57tuXjHc9902wFHqPUT8NyBwfBq-yMdKY65w6k4tB7pvtxJ0qVtkZ-eNmOyDpRucLRt3G-wUTmbm18h4ENgDVwMOfl_EWyuvLKycaHY_CfMsTKcjHoYe6uP5YyVa_m"/>
<!-- Biomechanical Calibration Labels -->
<div class="absolute top-1/4 right-0 flex flex-col items-end">
<span class="text-[9px] font-bold text-primary uppercase tracking-widest bg-black/40 px-2 py-0.5 mb-1">SCAPULAR PROTRACTION</span>
<div class="w-12 h-1 bg-primary"></div>
</div>
<div class="absolute bottom-1/3 left-4 flex flex-col items-start">
<span class="text-[9px] font-bold text-primary uppercase tracking-widest bg-black/40 px-2 py-0.5 mb-1">ELBOW ANGLE: 45°</span>
<div class="w-16 h-1 bg-primary"></div>
</div>
</div>
</div>
<!-- Dynamic Coaching Notifications -->
<div class="px-5 mb-12 flex flex-col gap-3">
<div class="bg-primary/10 border-l-4 border-primary p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="bolt">bolt</span>
<span class="text-sm font-black tracking-widest uppercase">ELBOWS IN</span>
</div>
<span class="text-[10px] font-bold text-primary/60 uppercase">CORRECTION REQ.</span>
</div>
<div class="bg-surface-container-highest/50 border-l-4 border-outline-variant p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="check_circle">check_circle</span>
<span class="text-sm font-black tracking-widest uppercase text-on-surface-variant">LOCK OUT</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant/40 uppercase">ACTIVE CUE</span>
</div>
</div>
</main>
<!-- Bottom Action Shell -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-dim/80 backdrop-blur-xl px-5 py-8 z-50">
<div class="flex gap-4">
<button class="flex-grow bg-primary text-on-primary font-black py-5 tracking-[0.2rem] uppercase rounded-lg active:scale-95 transition-transform flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="stop_circle">stop_circle</span>
                END SET
            </button>
<button class="aspect-square bg-surface-container-high border border-outline-variant/15 flex items-center justify-center p-5 rounded-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface" data-icon="pause">pause</span>
</button>
</div>
<!-- Subtle Progress Arc -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-container">
<div class="h-full bg-primary" style="width: 68%;"></div>
</div>
</footer>
<!-- Invisible HUD Elements for 'Pro Tools' Vibe -->
<div class="fixed top-24 right-5 flex flex-col gap-4 text-right">
<div class="flex flex-col">
<span class="text-[8px] font-bold text-outline uppercase tracking-widest">TEMPO</span>
<span class="text-xs font-bold text-secondary">2-0-1-0</span>
</div>
<div class="flex flex-col">
<span class="text-[8px] font-bold text-outline uppercase tracking-widest">ECCENTRIC</span>
<span class="text-xs font-bold text-on-surface">1.2s</span>
</div>
<div class="flex flex-col">
<span class="text-[8px] font-bold text-outline uppercase tracking-widest">EXPLOSIVE</span>
<span class="text-xs font-bold text-on-surface">0.4s</span>
</div>
</div>
</body></html>
