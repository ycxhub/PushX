<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PushX support — contact us by phone or email." />
  <title>PushX — Support</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#81ecff",
            "primary-container": "#00e3fd",
            "on-primary-container": "#004d57",
            "on-surface": "#ffffff",
            "on-surface-variant": "#adaaaa",
            surface: "#0e0e0e",
            "surface-container": "#1a1a1a",
            "surface-container-low": "#131313",
            "outline-variant": "#484847",
            background: "#0e0e0e",
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "-apple-system", "sans-serif"],
          },
          borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        },
      },
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .kinetic-gradient {
      background: linear-gradient(135deg, #81ecff 0%, #00e3fd 100%);
    }
    body {
      background-color: #0e0e0e;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-sans selection:bg-primary selection:text-on-primary flex flex-col min-h-dvh">
  <header class="flex items-center justify-between px-5 py-4 bg-[#0e0e0e]/90 backdrop-blur-xl border-b border-outline-variant/15">
    <a href="../" class="flex items-center gap-3 group">
      <span class="font-black tracking-widest uppercase text-2xl text-primary group-hover:text-[#00e3fd] transition-colors">PushX</span>
    </a>
    <nav class="text-[0.6875rem] font-bold tracking-[0.05rem] uppercase">
      <a class="text-on-surface-variant hover:text-primary transition-colors" href="/pushx/privacy-policy">Privacy</a>
    </nav>
  </header>

  <main class="flex-1 max-w-lg mx-auto w-full px-5 py-12 md:py-16">
    <span class="text-[0.6875rem] font-bold tracking-[0.05rem] uppercase text-primary block mb-2">Support</span>
    <h1 class="text-3xl md:text-4xl font-black tracking-tighter uppercase leading-tight">We&apos;re here</h1>
    <p class="mt-3 text-on-surface-variant text-sm leading-relaxed">
      Questions, feedback, or calibration issues — reach us using the options below.
    </p>

    <div class="mt-10 space-y-4">
      <a href="tel:+919003078007" class="flex items-center gap-4 p-5 rounded-xl bg-surface-container-low ring-1 ring-outline-variant/10 hover:ring-primary/30 transition-all group">
        <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center ring-1 ring-outline-variant/15 group-hover:bg-primary/15">
          <span class="material-symbols-outlined text-primary">call</span>
        </div>
        <div>
          <span class="text-[0.625rem] font-bold tracking-widest uppercase text-on-surface-variant block">Phone</span>
          <span class="text-lg font-bold tracking-tight text-white">+91 9003078007</span>
        </div>
        <span class="material-symbols-outlined text-outline ml-auto text-sm">chevron_right</span>
      </a>

      <a href="mailto:jontgot@gmail.com" class="flex items-center gap-4 p-5 rounded-xl bg-surface-container-low ring-1 ring-outline-variant/10 hover:ring-primary/30 transition-all group">
        <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center ring-1 ring-outline-variant/15 group-hover:bg-primary/15">
          <span class="material-symbols-outlined text-primary">mail</span>
        </div>
        <div class="min-w-0 flex-1">
          <span class="text-[0.625rem] font-bold tracking-widest uppercase text-on-surface-variant block">Email</span>
          <span class="text-base font-bold tracking-tight text-white break-all">jontgot@gmail.com</span>
        </div>
        <span class="material-symbols-outlined text-outline shrink-0 text-sm">chevron_right</span>
      </a>
    </div>

    <a href="../" class="mt-12 inline-flex items-center gap-2 text-[0.6875rem] font-bold tracking-[0.05rem] uppercase text-primary hover:text-[#00e3fd] transition-colors">
      <span class="material-symbols-outlined text-base">arrow_back</span>
      Back to PushX
    </a>
  </main>

  <footer class="border-t border-outline-variant/15 px-5 py-6 text-center text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">
    <a href="../" class="hover:text-primary transition-colors">PushX</a>
    <span class="mx-2 text-outline-variant">·</span>
    <a href="/pushx/privacy-policy" class="hover:text-primary transition-colors">Privacy</a>
  </footer>
</body>
</html>
